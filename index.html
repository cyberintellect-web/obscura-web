<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obscura | Execute Without Limits</title>
    <style>
        :root {
            --bg-dark: #000000;
            --main-purple: #ae47ff;
            --purple-glow: rgba(174, 71, 255, 0.4);
            --text-main: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --nav-bg: rgba(5, 5, 5, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1a0229 0%, #000000 80%);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- Updated Navigation Bar --- */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px 0;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-container {
            width: 90%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
        }

        .logo-box {
            width: 35px;
            height: 35px;
            background: var(--main-purple);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            box-shadow: 0 0 15px var(--purple-glow);
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .nav-menu {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px;
            border-radius: 12px;
            list-style: none;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--text-secondary);
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-menu a:hover, .nav-menu a.active {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-nav-download {
            background: var(--main-purple);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 0 15px var(--purple-glow);
            transition: 0.3s;
        }

        .btn-nav-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px var(--purple-glow);
        }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-top: 80px;
        }

        .version-tag {
            background: rgba(174, 71, 255, 0.1);
            color: #d199ff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid rgba(174, 71, 255, 0.2);
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5.5rem);
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 0 30px var(--purple-glow);
        }

        .hero p {
            max-width: 600px;
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .hero-btns {
            display: flex;
            gap: 20px;
        }

        .btn-main {
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-purple {
            background: var(--main-purple);
            color: white;
            box-shadow: 0 10px 20px rgba(174, 71, 255, 0.2);
        }

        .btn-outline {
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-main:hover {
            transform: translateY(-3px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-menu { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo-group">
                <div class="logo-box">O</div>
                <div class="logo-text">OBSCURA</div>
            </a>

            <ul class="nav-menu">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="download.html">Downloads</a></li>
                <li><a href="#">Admin</a></li>
            </ul>

            <div class="nav-right">
                <a href="download.html" class="btn-nav-download">Get Obscura</a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="version-tag">✨ Version 2.4.1 Now Available</div>
        <h1>Execute<br>Without Limits</h1>
        <p>The most powerful and undetectable Roblox executor. Lightning-fast execution, 100% uptime, and the largest script library.</p>
        
        <div class="hero-btns">
            <a href="download.html" class="btn-main btn-purple">Download Now</a>
            <a href="#features" class="btn-main btn-outline">View Features</a>
        </div>
    </section>

</body>
</html>
